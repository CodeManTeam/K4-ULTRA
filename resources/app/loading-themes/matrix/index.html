<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700;900&display=swap');

#kitten-loader-wrap {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 99;
  background: #000; overflow: hidden;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
}

#matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.7; }

/* Vignette 暗角 */
.matrix-vignette {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  z-index: 1; pointer-events: none;
}

/* 扫描线 */
.matrix-scanlines {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 0, 0.02) 50%);
  background-size: 100% 3px;
  z-index: 1; pointer-events: none;
}

.matrix-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; z-index: 2;
}

.matrix-title {
  font-size: 64px; font-weight: 900;
  color: #00ff00;
  text-shadow:
    0 0 7px rgba(0, 255, 0, 0.6),
    0 0 20px rgba(0, 255, 0, 0.3),
    0 0 50px rgba(0, 255, 0, 0.1);
  letter-spacing: 8px;
  opacity: 0;
  animation: matrixReveal 2s ease-out forwards 0.3s;
}

@keyframes matrixReveal {
  0% { opacity: 0; text-shadow: 0 0 0 transparent; }
  30% { opacity: 0.5; }
  100% { opacity: 1; text-shadow: 0 0 7px rgba(0,255,0,0.6), 0 0 20px rgba(0,255,0,0.3); }
}

.matrix-title .blink {
  animation: cursorBlink 1s step-end infinite;
}

@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.matrix-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 300;
  color: rgba(0, 255, 0, 0.5);
  margin-top: 20px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 1s ease-out forwards 0.8s;
}

@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ASCII 装饰行 */
.matrix-ascii {
  font-size: 10px;
  color: rgba(0, 255, 0, 0.15);
  letter-spacing: 2px;
  margin-top: 24px;
  line-height: 1.6;
  opacity: 0;
  animation: fadeIn 1.5s ease-out forwards 1.2s;
}

/* 进度条 - 二进制风格 */
.matrix-progress {
  margin-top: 40px;
  opacity: 0;
  animation: fadeIn 0.8s ease-out forwards 1.5s;
}
.matrix-progress-bar {
  width: 300px; height: 2px;
  background: rgba(0, 255, 0, 0.1);
  position: relative; overflow: hidden;
  margin: 0 auto;
}
.matrix-progress-fill {
  height: 100%; width: 0%;
  background: #00ff00;
  box-shadow: 0 0 10px rgba(0, 255, 0, 0.5), 0 0 30px rgba(0, 255, 0, 0.2);
  animation: matrixProgress 3s ease-in-out infinite;
}
@keyframes matrixProgress {
  0% { width: 2%; }
  30% { width: 35%; }
  60% { width: 55%; }
  100% { width: 8%; }
}

.matrix-progress-text {
  font-size: 10px;
  color: rgba(0, 255, 0, 0.3);
  margin-top: 8px;
  letter-spacing: 1px;
}

#offline-text {
  display: inline-block;
  margin-top: 32px;
  padding: 8px 20px;
  border: 1px solid rgba(0, 255, 0, 0.15);
  color: rgba(0, 255, 0, 0.4);
  cursor: pointer;
  background: rgba(0, 255, 0, 0.03);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.3s ease;
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards 2s;
}
#offline-text:hover {
  background: rgba(0, 255, 0, 0.08);
  border-color: rgba(0, 255, 0, 0.3);
  color: #00ff00;
  box-shadow: 0 0 20px rgba(0, 255, 0, 0.05);
}
</style>
<canvas id="matrix-canvas"></canvas>
<div class="matrix-vignette"></div>
<div class="matrix-scanlines"></div>
<div class="matrix-overlay">
  <div class="matrix-title">K4 ULTRA<span class="blink">_</span></div>
  <div class="matrix-subtitle">SYSTEM BOOT SEQUENCE INITIALIZING</div>
  <div class="matrix-ascii">┌──────────────────────────────┐<br>│  ◈  DECRYPTING KERNEL  ◈  │<br>└──────────────────────────────┘</div>
  <div class="matrix-progress">
    <div class="matrix-progress-bar"><div class="matrix-progress-fill"></div></div>
    <div class="matrix-progress-text">0x4B 0x34 0x20 0x55 0x4C 0x54 0x52 0x41</div>
  </div>
  <div id="offline-text" onclick="switch_mode()">> 离线打开_</div>
</div>
<script>
(function(){
  var c = document.getElementById('matrix-canvas');
  var ctx = c.getContext('2d');
  function resize(){ c.width = c.parentElement.clientWidth; c.height = c.parentElement.clientHeight; }
  resize(); window.addEventListener('resize', resize);
  var chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  var fontSize = 16;
  var columns = Math.floor(c.width / fontSize);
  var drops = Array(columns).fill(1);
  function draw(){
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';
    for(var i=0;i<drops.length;i++){
      var text = chars.charAt(Math.floor(Math.random()*chars.length));
      ctx.fillText(text, i*fontSize, drops[i]*fontSize);
      if(drops[i]*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 33);
})();
</script>
